<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>툴디 서비스기획 포트폴리오 | 김유진</title>
  <style>
    :root {
      --blue: #1668ff;
      --black: #0f172a;
      --ink: #334155;
      --muted: #64748b;
      --line: #e2e8f0;
      --bg: #f8fafc;
      --card: rgba(255, 255, 255, 0.86);
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 20%, rgba(22, 104, 255, 0.12), transparent 30%),
        linear-gradient(135deg, #f8fafc 0%, #eef4ff 48%, #ffffff 100%);
      color: var(--black);
      overflow: hidden;
    }

    .selector {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px;
    }

    .wrap {
      width: min(1120px, 100%);
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: 36px;
      align-items: center;
    }

    .intro {
      display: grid;
      gap: 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .brand img {
      height: 30px;
      object-fit: contain;
    }

    .kicker {
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(22, 104, 255, 0.08);
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.06em;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 5vw, 68px);
      line-height: 1.02;
      letter-spacing: -0.02em;
    }

    .lead {
      margin: 0;
      color: var(--ink);
      font-size: 18px;
      line-height: 1.65;
      max-width: 520px;
      font-weight: 600;
    }

    .cards {
      display: grid;
      gap: 18px;
    }

    .choice {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 26px;
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 22px;
      background: var(--card);
      box-shadow: var(--shadow);
      cursor: pointer;
      text-align: left;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .choice:hover {
      transform: translateY(-3px);
      border-color: rgba(22, 104, 255, 0.38);
      box-shadow: 0 30px 90px rgba(15, 23, 42, 0.16);
    }

    .choice .label {
      display: inline-flex;
      width: fit-content;
      padding: 5px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: var(--blue);
      font-size: 11px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .choice h2 {
      margin: 0 0 8px;
      font-size: 25px;
      line-height: 1.25;
      letter-spacing: -0.01em;
    }

    .choice p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      font-weight: 600;
    }

    .arrow {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--black);
      color: #fff;
      font-size: 24px;
      font-weight: 900;
    }

    .viewer {
      display: none;
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 10;
    }

    .viewer.active { display: block; }

    .viewer-bar {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      color: #fff;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.2);
    }

    .viewer-bar button,
    .viewer-bar a {
      border: 0;
      border-radius: 999px;
      padding: 6px 9px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
    }

    .viewer-title {
      min-width: 140px;
      text-align: center;
      font-size: 11px;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.82);
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: 0;
      display: block;
      background: #fff;
    }

    @media (max-width: 860px) {
      body { overflow: auto; }
      .selector { padding: 28px 18px; }
      .wrap { grid-template-columns: 1fr; }
      .lead { font-size: 16px; }
      .choice { grid-template-columns: 1fr; }
      .arrow { display: none; }
      .viewer-bar { width: calc(100% - 24px); justify-content: space-between; }
      .viewer-title { min-width: 0; }
    }
  </style>
</head>
<body>
  <main class="selector" data-selector>
    <div class="wrap">
      <section class="intro">
        <div class="brand">
          <img src="./asset_tara_logo_cutout.png" alt="Tara TPS logo">
          서비스기획 직무 지원자 김유진
        </div>
        <div class="kicker">TOOLDI SERVICE PLANNING PORTFOLIO</div>
        <h1>툴디 서비스기획<br>포트폴리오</h1>
        <p class="lead">초기 검수 플로우 기획안과 VOC 기반 재정의 기획안을 함께 정리했습니다. 확인할 문서를 선택하면 해당 기획안으로 이동합니다.</p>
      </section>

      <section class="cards" aria-label="portfolio choices">
        <button class="choice" type="button" data-open="tooldi_voc_based_proposal.html" data-title="VOC 기반 재정의 기획안">
          <div>
            <span class="label">VOC-BASED UPDATE</span>
            <h2>VOC 기반 템플릿 경험 개선안</h2>
            <p>커뮤니티 VOC와 LDA 토픽 분석을 바탕으로 템플릿 탐색·분류·노출 경험을 재정의한 기획안입니다.</p>
          </div>
          <div class="arrow">›</div>
        </button>

        <button class="choice" type="button" data-open="tooldi_review_flow_portfolio_standalone.html" data-title="초기 제출 기획안">
          <div>
            <span class="label">ORIGINAL PROPOSAL</span>
            <h2>명함·청첩장 주문 전 검수 플로우</h2>
            <p>인쇄 주문 직전 텍스트 검수와 PDF 확인 흐름을 중심으로 구성한 초기 기획안입니다.</p>
          </div>
          <div class="arrow">›</div>
        </button>
      </section>
    </div>
  </main>

  <section class="viewer" data-viewer>
    <div class="viewer-bar">
      <button type="button" data-back>처음으로</button>
      <div class="viewer-title" data-viewer-title>Portfolio</div>
      <a href="#" target="_blank" rel="noopener" data-new-tab>새 탭에서 보기</a>
    </div>
    <iframe title="portfolio document" data-frame></iframe>
  </section>

  <script>
    const selector = document.querySelector('[data-selector]');
    const viewer = document.querySelector('[data-viewer]');
    const frame = document.querySelector('[data-frame]');
    const title = document.querySelector('[data-viewer-title]');
    const newTab = document.querySelector('[data-new-tab]');

    document.querySelectorAll('[data-open]').forEach((button) => {
      button.addEventListener('click', () => {
        const url = button.dataset.open;
        frame.src = url;
        title.textContent = button.dataset.title;
        newTab.href = url;
        selector.style.display = 'none';
        viewer.classList.add('active');
      });
    });

    document.querySelector('[data-back]').addEventListener('click', () => {
      viewer.classList.remove('active');
      frame.src = 'about:blank';
      selector.style.display = 'grid';
    });
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
